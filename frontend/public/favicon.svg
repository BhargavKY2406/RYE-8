<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
    <defs>
        <linearGradient id="neon-pink" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FF007A" />
            <stop offset="100%" stop-color="#7928CA" />
        </linearGradient>
        <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F0FF" />
            <stop offset="100%" stop-color="#5433FF" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="30" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Deep Space Black Background -->
    <rect width="1024" height="1024" rx="224" fill="#0A0A0C" />
    
    <!-- Outer Glow & Main Tubes -->
    <g filter="url(#glow)">
        <!-- The Left Stem (Blue Neon) -->
        <path d="M320,780 L320,240" stroke="url(#neon-blue)" stroke-width="160" stroke-linecap="round" fill="none" />
        
        <!-- The Loop (Pink Neon) -->
        <path d="M320,240 L560,240 C760,240 840,340 840,440 C840,540 760,640 560,640 L320,640" 
              stroke="url(#neon-pink)" stroke-width="160" stroke-linecap="round" fill="none" />
              
        <!-- The Leg (Blue Neon) -->
        <path d="M520,640 L780,820" 
              stroke="url(#neon-blue)" stroke-width="160" stroke-linecap="round" fill="none" />
    </g>
    
    <!-- Inner Core for sharp neon look (White/bright core) -->
    <!-- Stem -->
    <path d="M320,780 L320,240" stroke="#E0FFFF" stroke-width="50" stroke-linecap="round" fill="none" />
    <!-- Loop -->
    <path d="M320,240 L560,240 C760,240 840,340 840,440 C840,540 760,640 560,640 L320,640" 
          stroke="#FFE0F0" stroke-width="50" stroke-linecap="round" fill="none" />
    <!-- Leg -->
    <path d="M520,640 L780,820" 
          stroke="#E0FFFF" stroke-width="50" stroke-linecap="round" fill="none" />
</svg>