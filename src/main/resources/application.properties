# ========================================================================
# RESTAURANT FOOD ORDERING APPLICATION - Configuration
# ========================================================================

# ---- Server Configuration ----
server.port=8080
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true



# ---- MySQL Datasource Configuration ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&sessionVariables=FOREIGN_KEY_CHECKS=0}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate Configuration ----
# 'update' will auto-apply schema changes without dropping tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ---- SQL Initialization ----
# Run data.sql after Hibernate creates/updates tables.
# Change to 'never' after the first run to avoid duplicate inserts.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ---- Jackson Serialization ----
# Render dates as ISO-8601 strings, not numeric timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- Static Resources ----
# Serves frontend files (index.html, style.css, app.js) from /static
spring.web.resources.static-locations=classpath:/static/

# ---- Logging ----
logging.level.org.springframework.security=DEBUG
logging.level.com.restaurant=DEBUG
