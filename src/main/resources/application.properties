# ========================================================================
# RESTAURANT FOOD ORDERING APPLICATION - Configuration
# ========================================================================

# ---- Server Configuration ----
server.port=8080
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true



# ---- Database Configuration (Switched to H2 to prevent Aiven crashes) ----
spring.datasource.url=jdbc:h2:mem:restaurant_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# 'update' will auto-apply schema changes without dropping tables
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ---- SQL Initialization ----
# Run data.sql after Hibernate creates/updates tables.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- Jackson Serialization ----
# Render dates as ISO-8601 strings, not numeric timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- Static Resources ----
# Serves frontend files (index.html, style.css, app.js) from /static
spring.web.resources.static-locations=classpath:/static/

# ---- Logging ----
logging.level.org.springframework.security=DEBUG
logging.level.com.restaurant=DEBUG
